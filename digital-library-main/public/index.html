<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Library</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .status {
            background: #f0f4ff;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            border-left: 4px solid #667eea;
        }
        
        .status-title {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .status-text {
            color: #555;
            font-size: 0.95em;
        }
        
        .features {
            text-align: left;
            margin: 30px 0;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
        }
        
        .features h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .features ul {
            list-style: none;
        }
        
        .features li {
            padding: 8px 0;
            color: #555;
            border-bottom: 1px solid #eee;
        }
        
        .features li:last-child {
            border-bottom: none;
        }
        
        .features li:before {
            content: "✓ ";
            color: #667eea;
            font-weight: bold;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Digital Library</h1>
        <p>Welcome to your Digital Library System</p>
        
        <div class="status">
            <div class="status-title">✓ Server Status</div>
            <div class="status-text">Server is running successfully!</div>
        </div>
        
        <div class="features">
            <h3>Available Features:</h3>
            <ul>
                <li>Book Management & Organization</li>
                <li>Voice-Based Search</li>
                <li>Speech Recognition</li>
                <li>Multi-language Support</li>
                <li>Book Recommendations</li>
            </ul>
        </div>
        
        <p style="margin-top: 30px; font-size: 0.9em; color: #999;">
            Version 1.0.0 | Ready to expand
        </p>
    </div>
</body>
</html>
